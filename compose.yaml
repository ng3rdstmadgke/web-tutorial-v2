services:
  backend:
    container_name: web-tutorial-v2-backend-${HOST_USER}
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:                        # ← 追加
      - backend/.env                 # ← 追加
    ports:
      - "8000:8000"
    volumes:
      # ホットリロード用にホスト側のディレクトリをマウント
      - ${HOST_DIR}/backend/app:/opt/backend/app  # ホスト側:コンテナ側
    networks:
      # devcontainerと同じネットワークで起動
      - devcontainer-nw
  db:
    container_name: web-tutorial-v2-db-${HOST_USER}
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_pass
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    networks:
      - devcontainer-nw
  frontend:
    container_name: web-tutorial-v2-frontend-${HOST_USER}
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # ホットリロード用にホスト側のディレクトリをマウント
      - ${HOST_DIR}/frontend:/opt/frontend
      # node_modules と .next はコンテナ内のものを優先
      - /opt/frontend/node_modules
      - /opt/frontend/.next
    networks:
      - devcontainer-nw
networks:
  devcontainer-nw:
    external: true
    name: br-web-tutorial-v2-${HOST_USER}