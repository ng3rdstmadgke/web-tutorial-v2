services:
  backend:
    container_name: web-tutorial-v2-backend-${HOST_USER}
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - backend/.env
    volumes:
      # ホットリロード用にホスト側のディレクトリをマウント
      - ${HOST_DIR}/backend/app:/opt/backend/app  # ホスト側:コンテナ側
    depends_on:
      # migrate(マイグレーション+シード)が正常終了してから起動する
      migrate:
        condition: service_completed_successfully
    networks:
      # devcontainerと同じネットワークで起動
      - devcontainer-nw
  migrate:
    # 起動時に一度だけ alembic upgrade head + seed を実行するワンショットサービス
    container_name: web-tutorial-v2-migrate-${HOST_USER}
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - backend/.env
    volumes:
      # app に加えて alembic 一式もマウントする(マイグレーションの適用に必要)
      - ${HOST_DIR}/backend/app:/opt/backend/app
      - ${HOST_DIR}/backend/alembic:/opt/backend/alembic
      - ${HOST_DIR}/backend/alembic.ini:/opt/backend/alembic.ini
    command: ["sh", "-c", "uv run alembic upgrade head && uv run python -m app.seed"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - devcontainer-nw
  db:
    container_name: web-tutorial-v2-db-${HOST_USER}
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_pass
      POSTGRES_DB: app
    healthcheck:
      # migrate / backend が起動を待てるように疎通確認する
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - devcontainer-nw
  frontend:
    container_name: web-tutorial-v2-frontend-${HOST_USER}
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - frontend/.env
    volumes:
      # ホットリロード用にホスト側のディレクトリをマウント
      - ${HOST_DIR}/frontend:/opt/frontend
      # node_modules と .next はコンテナ内のものを優先
      - /opt/frontend/node_modules
      - /opt/frontend/.next
    networks:
      - devcontainer-nw
  proxy:
    container_name: web-tutorial-v2-proxy-${HOST_USER}
    image: nginx:1.27-alpine
    volumes:
      # リバースプロキシ設定 (/ -> frontend, /api/ -> backend)
      - ${HOST_DIR}/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - devcontainer-nw
networks:
  devcontainer-nw:
    external: true
    name: br-web-tutorial-v2-${HOST_USER}