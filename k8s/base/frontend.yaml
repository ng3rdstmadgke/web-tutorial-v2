apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  annotations:
    argocd.argoproj.io/sync-wave: '2'   # migrate(wave 1) の後に起動する
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret   # private GHCR から image を pull するための認証
      containers:
        - name: frontend
          image: web-tutorial-v2-frontend
          ports:
            - containerPort: 3000
          env:
            - name: INTERNAL_API_URL
              valueFrom:
                configMapKeyRef:  # 指定したConfigMapから特定のキーの値を環境変数に設定
                  name: app-config
                  key: INTERNAL_API_URL
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  annotations:
    argocd.argoproj.io/sync-wave: '2'   # frontend tier は migrate の後
    # 未ログイン時のリダイレクト(3xx)も成功扱いにするため 200-399 を成功とする。
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: 200-399
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000