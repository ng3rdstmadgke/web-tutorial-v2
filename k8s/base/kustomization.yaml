apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - db.yaml
  - migrate-job.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

# 全リソースの metadata に共通ラベルを付与する(セレクタには付けない)。
labels:
  - pairs:
      app.kubernetes.io/part-of: web-tutorial
    includeSelectors: false