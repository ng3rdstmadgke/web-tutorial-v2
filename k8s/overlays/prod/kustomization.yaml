apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: web-tutorial

resources:
- ../../base

# base のプレースホルダ image 名を GHCR の実イメージ + タグに置き換える。
# newTag のデフォルトは latest。CI の deploy ジョブが sha-<コミット> に書き換える。
# backend の置換は backend Deployment と migrate Job の両方に効く(同じ image 名のため)。
images:
- name: web-tutorial-v2-backend
  newName: ghcr.io/ng3rdstmadgke/web-tutorial-v2-backend
  newTag: sha-68cf881
- name: web-tutorial-v2-frontend
  newName: ghcr.io/ng3rdstmadgke/web-tutorial-v2-frontend
  newTag: sha-68cf881

replicas:
- count: 2
  name: backend
- count: 2
  name: frontend

patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: web-tutorial
