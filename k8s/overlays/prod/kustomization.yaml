apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: web-tutorial   # 全リソースを web-tutorial namespace に配置する

resources:
  - ../../base

# base のプレースホルダ image 名を GHCR の実イメージ + タグに置き換える。
# newTag のデフォルトは latest。CI の deploy ジョブが sha-<コミット> に書き換える。
# backend の置換は backend Deployment と migrate Job の両方に効く(同じ image 名のため)。
images:
  - name: web-tutorial-v2-backend
    newName: ghcr.io/YOUR_GITHUB_USERNAME/web-tutorial-v2-backend  # <- 変更: 自分のGHCRのURL
    newTag: latest
  - name: web-tutorial-v2-frontend
    newName: ghcr.io/YOUR_GITHUB_USERNAME/web-tutorial-v2-frontend  # <- 変更: 自分のGHCRのURL
    newTag: latest

replicas:
  - name: backend
    count: 2
  - name: frontend
    count: 2

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: web-tutorial